name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'deploy*'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_GEOLOCATION_API_URL: ${{ vars.VITE_GEOLOCATION_API_URL || 'https://nominatim.openstreetmap.org/reverse' }}
          VITE_GEO_IP_API_URL: ${{ vars.VITE_GEO_IP_API_URL || 'https://apip.cc/json' }}
          VITE_SALAT_API_URL: ${{ vars.VITE_SALAT_API_URL || 'https://api.aladhan.com/v1/timings' }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
